name: Deploy ShareVault

on:
  push:
    branches:
      - main

jobs:

  # ─────────────────────────────────────────────────────────────────
  # JOB 1: Deploy Backend
  # ─────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest

    steps:
      - name: SSH into VPS and deploy backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            echo "=== Pulling latest code ==="
            cd /home/prahlad/sharevault
            git pull origin main

            echo "=== Installing backend dependencies ==="
            cd /home/prahlad/sharevault/backend
            npm install --omit=dev

            echo "=== Restarting API with PM2 ==="
            pm2 reload sharevault-api --update-env

            echo "=== Deploy status ==="
            pm2 status

  # ─────────────────────────────────────────────────────────────────
  # JOB 2: Build & Deploy Frontend
  # Builds on GitHub (faster than VPS), copies built files via SCP
  # Runs only after Job 1 succeeds
  # ─────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build React app for production
        working-directory: frontend
        env:
          REACT_APP_API_URL: https://api.sharevault.prahladsingh.in/api
          CI: false
        run: npm run build

      - name: Copy build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "frontend/build/*"
          target: "/home/prahlad/sharevault/frontend/"
          strip_components: 1

      - name: Reload Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            sudo systemctl reload nginx
            echo "=== Frontend deployed ==="