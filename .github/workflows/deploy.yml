
name: Deploy ShareVault

on:
  push:
    branches:
      - main

jobs:

  # ─────────────────────────────────────────────────────────────────
  # JOB 1: Deploy Backend
  # ─────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest

    steps:
      - name: SSH into VPS and deploy backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            echo "=================================="
            echo "Updating ShareVault Repository"
            echo "=================================="

            cd /home/prahlad/sharevault

            git fetch origin
            git reset --hard origin/main
            git clean -fd

            echo "=================================="
            echo "Current Commit"
            echo "=================================="

            git log --oneline -1
            git status

            echo "=================================="
            echo "Installing Backend Dependencies"
            echo "=================================="

            cd backend
            npm install --omit=dev

            echo "=================================="
            echo "Restarting Backend"
            echo "=================================="

            pm2 reload sharevault-api --update-env

            echo "=================================="
            echo "PM2 Status"
            echo "=================================="

            pm2 status

  # ─────────────────────────────────────────────────────────────────
  # JOB 2: Build & Deploy Frontend
  # ─────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build React App
        working-directory: frontend
        env:
          REACT_APP_API_URL: https://api.sharevault.prahladsingh.in/api
          CI: false
        run: npm run build

      - name: Upload Build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "frontend/build/*"
          target: "/home/prahlad/sharevault/frontend/"
          strip_components: 1

      - name: Reload Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            sudo systemctl reload nginx

            echo "=================================="
            echo "Frontend Deployment Complete"
            echo "=================================="

